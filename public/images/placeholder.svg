<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1d27"/>
  <rect x="1" y="1" width="798" height="448" rx="7" stroke="#2d3148" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#2d3148" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#2d3148" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#2d3148" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#2d3148" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#2d3148" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Decorative orb -->
  <circle cx="400" cy="200" r="120" fill="url(#grad1)" opacity="0.15"/>
  <!-- Zap icon -->
  <g transform="translate(375, 170)">
    <polygon points="25,0 10,22 20,22 5,45 30,18 18,18" fill="#10b981" opacity="0.9"/>
  </g>
  <!-- Logo text -->
  <text x="400" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#d1d5db" text-anchor="middle">Fábrica de Liberdade</text>
  <text x="400" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Imagem não disponível</text>
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
